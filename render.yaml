# Render Blueprint (Infrastructure-as-Code).
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: ci-cd-weather-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    # Deploys are driven by GitHub Actions (the Deploy job hits the Render
    # Deploy Hook) AFTER Build + Test pass — so deployment is gated on green
    # tests. Render itself must NOT auto-deploy, or every push would deploy
    # twice (once by Render, once by the Actions hook).
    autoDeploy: false
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Render automatically provides PORT; the Dockerfile binds Kestrel to it.
