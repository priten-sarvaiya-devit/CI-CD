name: CI-CD

# ---------------------------------------------------------------------------
# Triggers: every push and pull request targeting the master branch.
# ---------------------------------------------------------------------------
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:   # allows manual runs from the Actions tab

# Grant the GITHUB_TOKEN the rights the test reporter needs to publish a check.
permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  DOTNET_VERSION: '10.0.x'
  SOLUTION: 'CI-CD.slnx'
  API_PROJECT: 'CI-CD/CI-CD.csproj'
  CONFIGURATION: 'Release'
  # Speed up the SDK / avoid first-run noise in CI.
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  # =========================================================================
  # 1) BUILD — restore, compile, publish the API, and upload the artifact
  # =========================================================================
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET SDK ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION }} --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Publish API
        run: >
          dotnet publish ${{ env.API_PROJECT }}
          --configuration ${{ env.CONFIGURATION }}
          --no-restore
          --output ./publish

      - name: Verify publish output exists
        # Guard against a "silent" success — fail red if the expected DLL is missing.
        run: |
          if [ ! -f "./publish/CI-CD.dll" ]; then
            echo "::error::Publish produced no CI-CD.dll — build output is invalid."
            exit 1
          fi
          echo "✅ Publish output verified."

      - name: Upload published artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-cd-api
          path: ./publish
          retention-days: 7

  # =========================================================================
  # 2) TEST — runs only after BUILD succeeds; runs unit tests + report
  # =========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET SDK ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Run unit tests
        # dotnet test exits non-zero if ANY test fails or if no tests are found,
        # which fails this step (red) automatically.
        run: >
          dotnet test ${{ env.SOLUTION }}
          --configuration ${{ env.CONFIGURATION }}
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Upload test results
        # Run even when the test step fails, so results are always visible.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/**/*
          retention-days: 7

      - name: Publish test report summary
        # Always run so results show even when tests failed. Any failure here
        # (e.g. missing token rights) now turns the job RED — no masking.
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Unit Test Report
          path: ./TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

  # =========================================================================
  # 3) DEPLOY — runs only after TEST succeeds, and only on push to master
  #             (skipped for pull requests). Triggers a Render deployment
  #             via a Deploy Hook stored in the RENDER_DEPLOY_HOOK secret.
  # =========================================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Trigger Render deployment
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          # A Deploy job that didn't deploy must NOT report success.
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "::error::RENDER_DEPLOY_HOOK secret is not set — cannot deploy."
            echo "Add it under Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi
          echo "Triggering Render deployment..."
          http_code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK")
          echo "Render responded with HTTP $http_code"
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "✅ Deployment triggered successfully."
          else
            echo "::error::Render deploy hook returned HTTP $http_code — deploy failed."
            exit 1
          fi
